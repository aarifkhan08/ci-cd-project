apiVersion: v1
kind: Service
metadata:
  name: {{ include "cicd-eks-demo.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cicd-eks-demo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cicd-eks-demo.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
